services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1



  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - kafka
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-idp:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: idpdb
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru




  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - kafka
      - postgres

  postgres-routes:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: routedb
    ports:
      - "5434:5432"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - ROUTES_DB_HOST=postgres-routes
      - ROUTES_DB_PORT=5432
      - ROUTES_DB_NAME=routedb
      - ROUTES_DB_USER=user
      - ROUTES_DB_PASSWORD=password
    depends_on:
      - kafka
      - redis
      - postgres-routes

  authz-service:
    build:
      context: ./authz-service
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
    depends_on:
      - redis

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - kafka
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4000:80"
    depends_on:
      - api-gateway

  idp-service:
    build:
      context: ./idp-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - postgres-idp
      - redis

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
    ports:
      - "4001:80"
    depends_on:
      - api-gateway
      - idp-service

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_PLACEHOLDER}
      - STOREFRONT_URL=http://localhost:4001
    depends_on:
      - kafka

  realtime-service:
    build:
      context: .
      dockerfile: realtime-service/Dockerfile
    ports:
      - "3004:3004"
    depends_on:
      - kafka

  minio:
    image: minio/minio:latest
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    command: server /data --console-address ":9001"

  export-service:
    build:
      context: .
      dockerfile: export-service/Dockerfile
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
    depends_on:
      - kafka
      - minio

volumes:
  postgres_data:
